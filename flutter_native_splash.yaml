# Убирает белую вспышку при холодном старте. Порядок был такой: белый нативный
# экран → дартовый SplashScreen с брендом → Home. На тёмной теме эта вспышка
# бьёт по глазам и рушит сцену до того, как она началась.
#
# Картинку намеренно не задаём: дартовый SplashScreen подхватывает брендинг
# через доли секунды, а статичный логотип поверх анимированной лампады дал бы
# видимый стык. Задача этого экрана — только убрать вспышку.
#
# Цвета — фоны тем из lib/core/theme/app_colors.dart.
flutter_native_splash:
  color: "#FAF0E3"
  color_dark: "#1E1712"
  android_12:
    color: "#FAF0E3"
    color_dark: "#1E1712"
